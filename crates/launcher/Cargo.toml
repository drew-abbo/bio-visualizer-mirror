[package]
name = "launcher"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
util = { workspace = true }
eframe = { version = "0.33" }
egui = { workspace = true }
egui_extras = { workspace = true, features = ["image"] }

[features]
# Disables the console that automatically opens when you run an executable on
# Windows.
no-console = []
